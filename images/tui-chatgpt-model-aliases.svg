<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">claude-proxy TUI 设置 ChatGPT 模型别名</title>
  <desc id="desc">终端 TUI 中在 Model 页面把默认模型和 Claude alias 指向 ChatGPT 模型的示例截图。</desc>
  <defs>
    <style>
      .bg{fill:#0b1020}.panel{fill:#111827;stroke:#334155;stroke-width:2}.panel2{fill:#0f172a;stroke:#38bdf8;stroke-width:2}.muted{fill:#94a3b8}.text{fill:#e5e7eb}.accent{fill:#22d3ee}.accent2{fill:#a7f3d0}.warn{fill:#fbbf24}.key{fill:#0b1020}.keybg{fill:#22d3ee}.overlay{fill:#020617;stroke:#22d3ee;stroke-width:2}.mono{font-family:"JetBrains Mono","Cascadia Mono","SFMono-Regular",Consolas,monospace;font-size:23px}.small{font-size:19px}.title{font-size:26px;font-weight:700}.bold{font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <rect class="panel" x="24" y="24" width="1152" height="60" rx="6"/>
  <text class="mono title text" x="48" y="62">⬡ claude-proxy ●</text>
  <rect x="850" y="38" width="132" height="32" rx="5" fill="#1f2937"/>
  <text class="mono small text" x="869" y="61">1 providers</text>
  <rect x="996" y="38" width="152" height="32" rx="5" fill="#22d3ee"/>
  <text class="mono small key bold" x="1016" y="61">chatgpt/gpt-5.3-codex</text>

  <rect class="panel" x="24" y="96" width="230" height="560" rx="6"/>
  <text class="mono small accent bold" x="48" y="130">Menu</text>
  <text class="mono muted" x="48" y="177">◉ Dashboard</text>
  <text class="mono muted" x="48" y="221">◆ Providers</text>
  <text class="mono muted" x="48" y="265">⬡ Server</text>
  <text class="mono muted" x="48" y="309">⏻ Limits</text>
  <text class="mono muted" x="48" y="353">↗ HTTP</text>
  <text class="mono muted" x="48" y="397">☰ Logging</text>
  <text class="mono text bold" x="48" y="441">▶ ◇ Model</text>
  <text class="mono muted" x="48" y="485">⚙ System</text>

  <rect class="panel2" x="278" y="96" width="898" height="560" rx="6"/>
  <text class="mono title text" x="310" y="138">Model Aliases</text>
  <text class="mono accent bold" x="330" y="204">▸ Default</text>
  <rect x="530" y="178" width="520" height="42" rx="5" fill="#22d3ee"/>
  <text class="mono key bold" x="552" y="207">chatgpt/gpt-5.3-codex</text>
  <text class="mono muted" x="330" y="262">Reasoning</text>
  <text class="mono text" x="552" y="262">chatgpt/gpt-5.3-codex</text>
  <text class="mono muted" x="330" y="320">Opus Alias</text>
  <text class="mono text" x="552" y="320">chatgpt/gpt-5.3-codex</text>
  <text class="mono muted" x="330" y="378">Sonnet Alias</text>
  <text class="mono text" x="552" y="378">chatgpt/gpt-5.3-codex</text>
  <text class="mono muted" x="330" y="436">Haiku Alias</text>
  <text class="mono text" x="552" y="436">chatgpt/gpt-5.3-codex</text>
  <text class="mono muted" x="330" y="530">Format: provider_id/model_name. Empty = uses default</text>

  <rect class="overlay" x="430" y="190" width="620" height="342" rx="10"/>
  <text class="mono title text" x="470" y="236">Select model for chatgpt</text>
  <text class="mono muted" x="470" y="280">模型列表来自 ChatGPT provider 的 list_models。</text>
  <rect x="458" y="318" width="550" height="44" rx="5" fill="#22d3ee"/>
  <text class="mono key bold" x="482" y="348">▸ gpt-5.3-codex</text>
  <text class="mono muted" x="482" y="402">gpt-5.2-codex</text>
  <text class="mono muted" x="482" y="448">gpt-5-codex</text>
  <text class="mono muted" x="482" y="494">gpt-4.1</text>

  <rect x="24" y="668" width="1152" height="32" fill="#0f766e"/>
  <text class="mono small text" x="44" y="691"> ↑↓ move  Enter select  Esc cancel   Ctrl+S save</text>
</svg>
