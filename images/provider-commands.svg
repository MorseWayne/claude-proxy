<svg width="1180" height="620" viewBox="0 0 1180 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">claude-proxy provider commands</title>
  <desc id="desc">Terminal style screenshot showing provider management commands.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1180" height="620" fill="#e5e7eb"/>
  <rect x="70" y="56" width="1040" height="508" rx="18" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="70" y="56" width="1040" height="52" rx="18" fill="#1f2937"/>
  <circle cx="102" cy="82" r="7" fill="#ef4444"/>
  <circle cx="126" cy="82" r="7" fill="#f59e0b"/>
  <circle cx="150" cy="82" r="7" fill="#22c55e"/>
  <text x="590" y="88" text-anchor="middle" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">claude-proxy provider --help</text>
  <text x="106" y="148" fill="#22c55e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">$ claude-proxy provider --help</text>
  <text x="106" y="190" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Provider management</text>
  <text x="106" y="238" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Usage:</text>
  <text x="204" y="238" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">claude-proxy provider &lt;COMMAND&gt;</text>
  <text x="106" y="286" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Commands:</text>
  <text x="132" y="324" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">list</text><text x="330" y="324" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">List all configured providers</text>
  <text x="132" y="358" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">current</text><text x="330" y="358" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Show the current default model</text>
  <text x="132" y="392" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">add</text><text x="330" y="392" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Add a new provider</text>
  <text x="132" y="426" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">switch</text><text x="330" y="426" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Switch the default model to a provider</text>
  <text x="132" y="460" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">test</text><text x="330" y="460" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Test a provider's API key</text>
  <text x="132" y="494" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">speedtest</text><text x="330" y="494" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Speed test a provider's latency</text>
  <text x="132" y="528" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">fetch-models</text><text x="330" y="528" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Fetch and cache a provider's model list</text>
</svg>
