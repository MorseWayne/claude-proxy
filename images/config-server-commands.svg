<svg width="1180" height="620" viewBox="0 0 1180 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">claude-proxy runtime controls</title>
  <desc id="desc">Terminal style screenshot showing configuration and server management commands.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1180" height="620" fill="#e5e7eb"/>
  <rect x="70" y="56" width="1040" height="508" rx="18" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="70" y="56" width="1040" height="52" rx="18" fill="#1f2937"/>
  <circle cx="102" cy="82" r="7" fill="#ef4444"/>
  <circle cx="126" cy="82" r="7" fill="#f59e0b"/>
  <circle cx="150" cy="82" r="7" fill="#22c55e"/>
  <text x="590" y="88" text-anchor="middle" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">config and server controls</text>
  <text x="106" y="148" fill="#22c55e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">$ claude-proxy config --help</text>
  <text x="106" y="190" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Configuration management</text>
  <text x="132" y="230" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">show</text><text x="308" y="230" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Show current configuration (keys masked)</text>
  <text x="132" y="264" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">validate</text><text x="308" y="264" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Validate the configuration</text>
  <text x="132" y="298" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">export/import</text><text x="308" y="298" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Backup or restore TOML config</text>
  <text x="106" y="358" fill="#22c55e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">$ claude-proxy server --help</text>
  <text x="106" y="400" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Server management</text>
  <text x="132" y="440" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">start</text><text x="308" y="440" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Start the proxy server</text>
  <text x="132" y="474" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">restart</text><text x="308" y="474" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Graceful restart via SIGUSR1</text>
  <text x="132" y="508" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">status</text><text x="308" y="508" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Show server status</text>
</svg>
